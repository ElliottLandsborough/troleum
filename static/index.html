<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Compare UK petrol and diesel prices near you. Find nearby stations, sort by distance or fuel type, and view live fuel pricing data.">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Troleum">

    <meta property="og:url" content="https://troleum.org/">
    <meta property="og:locale" content="en_GB">
    <meta property="og:image" content="https://troleum.org/preview.png">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Troleum | UK Fuel Price Comparison Near You">

    <meta name="twitter:image" content="https://troleum.org/preview.png">

    <meta name="theme-color" content="#1a73e8">
    <link rel="preconnect" href="https://maps.googleapis.com">
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
    <link rel="stylesheet" href="main.css">

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Troleum",
            "url": "https://troleum.org/",
            "inLanguage": "en-GB",
            "description": "UK fuel price comparison website for finding petrol and diesel prices near your location."
        }
    </script>
</head>
<body>
    <div class="top-nav">
        <button id="my-location" title="Click to center map on your current location" onclick="centerMapOnUserLocation()">📍</button>
        <button id="search-mode-toggle" title="Click to enable manual location search" onclick="toggleSearchMode()">✏️</button>
        <input id="location-input" title="Enter a location" type="text" placeholder="Enter a location">
        <button id="menu-toggle" title="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 18L20 18" stroke="#000000" stroke-width="2" stroke-linecap="round" />
            <path d="M4 12L20 12" stroke="#000000" stroke-width="2" stroke-linecap="round" />
            <path d="M4 6L20 6" stroke="#000000" stroke-width="2" stroke-linecap="round" />
            </svg>
        </button>
    </div>

    <div id="info">
        <div id="location-sorter">
            <select id="sort-options">
                <option value="distance">Distance (order by)</option>
            </select>
        </div>
        <div id="location-list">
            <div class="location-list-placeholder">
                <p>Loading stations...</p>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="main.js"></script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBZBhqOIrxogvyAYko5uFbl7kH9nR28HS0&callback=initMap&libraries=places&loading=async" async defer></script>
</body>
