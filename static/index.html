<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>troleum.org - UK fuel price comparison and location website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        #map {
            width: 80%;
            height: 100%;
            height: calc(100% - 64px);
        }

        #info {
            width: 20%;
            height: 100%;
            height: calc(100% - 64px);
            float: right;
            overflow-y: scroll;
            padding: 0;
            background-color: #ff7070;
        }

        #info #location-sorder {
            height: 64px;
        }

        #info #location-list {
            height: calc(100% - 64px);
            margin-top: 0;
        }

        .info-window {
            padding: 10px;
            max-width: 200px;
        }

        .info-window h3 {
            margin: 0 5px 8px 0;
            color: #1a73e8;
            font-size: 16px;
        }

        .info-window p {
            margin: 4px 0;
            font-size: 14px;
            color: #333;
        }

        .info-window .description {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
        }

        .info-window table {
            margin-top: 8px;
        }

        .info-window table tr th {
            text-align: left;
        }

        .info-window table tr td {
            padding-top: 3px;
        }

        .info-window table tr td, .info-window table tr th {
            padding-right: 5px;
        }

        .gm-style-iw-chr {
            height: 0px;
        }

        .top-nav {
            height: 64px;
        }

        .top-nav #location-input {
            height: 64px;
            width: calc(100% - 64px - 64px - 64px);
            font-size: 20px;
            line-height: 64px;
            padding: 20px;
            float: left;
        }

        .top-nav #my-location {
            height: 64px;
            width: 64px;
            font-size: 24px;
            line-height: 64px;
            cursor: pointer;
            float: left;
        }

        .top-nav #search-mode-toggle {
            height: 64px;
            width: 64px;
            font-size: 24px;
            line-height: 64px;
            cursor: pointer;
            float: left;
        }

        .top-nav #menu-toggle {
            height: 64px;
            width: 64px;
            cursor: pointer;
            float: left;
            line-height: 64px;
            padding-top: 8px;
        }

        .top-nav #menu-toggle svg {
            width: 45px;
            height: 45px;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <!-- button to center map on user's current location -->
        <button id="my-location" title="Click to center map on your current location" onclick="centerMapOnUserLocation()">📍</button>
        <!-- button to toggle search location mode -->
        <button id="search-mode-toggle" title="Click to enable manual location search" onclick="toggleSearchMode()">✏️</button>
        <input id="location-input" title="Enter a location" type="text" placeholder="Enter a location" />
        <button id="menu-toggle" title="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 18L20 18" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 12L20 12" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 6L20 6" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>
    <div id="info">
        <div id="location-sorter">
            <p>Sort by:</p>
            <select id="sort-options">
                <option value="distance">Distance</option>
                <option value="price">Price</option>
            </select>
            <p>Display fuel type:</p>
            <select id="fuel-options">
                <option value="all">All</option>
                
            </select>
        </div>
        <div id="location-list">
            <p>Loading stations...</p>
        </div>
    </div>
    <div id="map"></div>

    <script>
        let map;
        let markers = [];
        let locations = [];
        let fuelTypes = [];
        let fuelTypesPromise = null;
        let latestPins = null;
        let infoWindows = [];
        let markersById = new Map();
        let infoWindowsById = new Map();
        let debounceTimer = null;
        let abortController = null;
        let userLat = null;
        let userLng = null;
        const USER_MARKER_Z_INDEX = 1000000;
        let isFollowingMyLocation = true;
        let searchLocationLat = null;
        let searchLocationLng = null;

        function updateFollowMeUI() {
            const btn = document.getElementById('my-location');
            const input = document.getElementById('location-input');
            const toggleBtn = document.getElementById('search-mode-toggle');

            if (isFollowingMyLocation) {
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
                input.disabled = true;
                input.style.opacity = '0.5';
                toggleBtn.style.opacity = '0.5';
                toggleBtn.style.cursor = 'not-allowed';
            } else {
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
                input.disabled = false;
                input.style.opacity = '1';
                toggleBtn.style.opacity = '1';
                toggleBtn.style.cursor = 'pointer';
            }
        }

        function setFollowMeMode() {
            isFollowingMyLocation = true;
            searchLocationLat = null;
            searchLocationLng = null;
            document.getElementById('location-input').value = '';

            markersById.forEach((marker, id) => {
                if (id === 'search-location') {
                    marker.setVisible(false);
                } else if (id === 'user-location') {
                    marker.setVisible(true);
                }
            });

            updateFollowMeUI();
        }

        function setSearchLocationMode(lat, lng) {
            isFollowingMyLocation = false;
            searchLocationLat = lat;
            searchLocationLng = lng;

            markersById.forEach((marker, id) => {
                if (id === 'user-location') {
                    marker.setVisible(false);
                } else if (id === 'search-location') {
                    marker.setVisible(true);
                }
            });

            updateFollowMeUI();
        }

        function toggleSearchMode() {
            if (isFollowingMyLocation) {
                // Switch to search mode (blue dot hidden, input enabled)
                isFollowingMyLocation = false;
                markersById.forEach((marker, id) => {
                    if (id === 'user-location') {
                        marker.setVisible(false);
                    }
                });
                updateFollowMeUI();
                document.getElementById('location-input').focus();
            } else {
                // Switch back to follow me mode
                setFollowMeMode();
            }
        }

        function preloadFuelTypes() {
            if (fuelTypesPromise) {
                return fuelTypesPromise;
            }

            const fuelTypesUrl = new URL('/api/fuel-types', window.location.origin);

            fuelTypesPromise = fetch(fuelTypesUrl)
                .then(res => res.json())
                .then(payload => {
                    fuelTypes = Array.isArray(payload?.data) ? payload.data : [];
                    return fuelTypes;
                })
                .catch(err => {
                    console.error('Failed to preload fuel types:', err);
                    fuelTypes = [];
                    return fuelTypes;
                });

            return fuelTypesPromise;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getMapsUrl(lat, lng, label) {
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const isAndroid = /Android/i.test(navigator.userAgent);
            const encodedLabel = encodeURIComponent(label || `${lat},${lng}`);

            if (isIOS) {
                return `https://maps.apple.com/?ll=${lat},${lng}&q=${encodedLabel}`;
            }

            if (isAndroid) {
                return `geo:${lat},${lng}?q=${lat},${lng}(${encodedLabel})`;
            }

            return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
        }

        function buildAddressLinkHtml(pin) {
            const addressText = pin.address || 'No address available';
            if (pin.lat == null || pin.lng == null) {
                return escapeHtml(addressText);
            }

            const mapsUrl = getMapsUrl(pin.lat, pin.lng, pin.name || addressText);
            return `<a href="${mapsUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(addressText)}</a>`;
        }

        function initMap() {
            // Create map centered on the world
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 6,
                center: { lat: 54.23782, lng: -4.555111 },
                mapTypeControl: true,
                streetViewControl: false
            });

            // Constantly update a blue dot on the map showing the user's current location, and center the map on it when the page loads
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Cache latest coordinates for station API requests.
                    userLat = lat;
                    userLng = lon;

                    // Populate text box with reverse-geocoded address on first detection
                    if (isFollowingMyLocation && !document.getElementById('location-input').value) {
                        const geocoder = new google.maps.Geocoder();
                        geocoder.geocode({ location: { lat, lng: lon } }, (results, status) => {
                            if (status === 'OK' && results[0]) {
                                document.getElementById('location-input').value = results[0].formatted_address;
                            }
                        });
                    }

                    // Create or update a marker for the user's location
                    if (!markersById.has('user-location')) {
                        const userMarker = new google.maps.Marker({
                            position: { lat, lng: lon },
                            map: map,
                            title: 'Your Location',
                            zIndex: USER_MARKER_Z_INDEX,
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 8,
                                fillColor: '#4285F4',
                                fillOpacity: 1,
                                strokeColor: '#ffffff',
                                strokeWeight: 2,
                            },
                        });
                        markersById.set('user-location', userMarker);
                    } else {
                        const userMarker = markersById.get('user-location');
                        userMarker.setPosition({ lat, lng: lon });
                        userMarker.setZIndex(USER_MARKER_Z_INDEX);
                        if (isFollowingMyLocation) {
                            userMarker.setVisible(true);
                        }
                    }
                });
            }

            // Fire-and-forget preload: starts immediately but never blocks map/markers rendering.
            preloadFuelTypes().then(() => {
                if (latestPins) {
                    renderStationInfo(latestPins);
                }
            });

            // Create bounds to fit all markers
            //const bounds = new google.maps.LatLngBounds();

            map.addListener('idle', () => {
                clearTimeout(debounceTimer);

                const url = new URL('/api/stations', window.location.origin);
                // Use last known user location from watchPosition if available.
                if (userLat != null && userLng != null) {
                    url.searchParams.set('lat', userLat);
                    url.searchParams.set('lng', userLng);
                }

                const bounds = map.getBounds();
                const ne = bounds.getNorthEast();
                const sw = bounds.getSouthWest();

                url.searchParams.set('bbox', `${sw.lat()},${sw.lng()},${ne.lat()},${ne.lng()}`);

                debounceTimer = setTimeout(async () => {
                    // Cancel any previous in-flight request
                    abortController?.abort();
                    abortController = new AbortController();

                    try {
                        const res = await fetch(url, { signal: abortController.signal });
                        const pins = await res.json();
                        latestPins = pins;
                        renderPins(pins);
                        renderStationInfo(pins);
                    } catch (err) {
                    if (err.name === 'AbortError') return; // expected, ignore
                        console.error(err);
                    }
                }, 200);
            });

            const input = document.getElementById("location-input");

            const autocomplete = new google.maps.places.Autocomplete(input);

            autocomplete.bindTo("bounds", map);

            autocomplete.setComponentRestrictions({ country: "uk" });
            autocomplete.setBounds(map.getBounds());

            //const marker = new google.maps.Marker({
            //    map: map,
            //});

            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();

                if (!place.geometry) {
                alert("No details available for this location");
                return;
                }

                const lat = place.geometry.location.lat();
                const lng = place.geometry.location.lng();

                if (!markersById.has('search-location')) {
                    const searchMarker = new google.maps.Marker({
                        position: { lat, lng },
                        map: map,
                        title: 'Search Location',
                        zIndex: 999999,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 8,
                            fillColor: '#34A853',
                            fillOpacity: 1,
                            strokeColor: '#ffffff',
                            strokeWeight: 2,
                        },
                    });
                    markersById.set('search-location', searchMarker);
                } else {
                    const searchMarker = markersById.get('search-location');
                    searchMarker.setPosition({ lat, lng });
                    searchMarker.setVisible(true);
                }

                setSearchLocationMode(lat, lng);

                // Center map on selected place
                if (place.geometry.viewport) {
                    map.fitBounds(place.geometry.viewport);
                    map.setZoom(14);
                } else {
                    map.setCenter(place.geometry.location);
                    map.setZoom(14);
                }
            });

            centerMapOnUserLocation();
        }

        function syncMarkerCollections() {
            markers = Array.from(markersById.values());
            infoWindows = Array.from(infoWindowsById.values());
        }

        function clearMarkers() {
            markersById.forEach(marker => marker.setMap(null));
            infoWindowsById.forEach(infoWindow => infoWindow.close());
            markersById.clear();
            infoWindowsById.clear();
            syncMarkerCollections();
        }

        function renderPins(pins) {
            const pinList = Array.isArray(pins?.data) ? pins.data : [];
            console.log(`Fetched ${pinList.length} pins from the server`);

            const nextIds = new Set(pinList.map(pin => String(pin.id)));

            // Remove markers that are no longer in the latest results.
            markersById.forEach((marker, id) => {
                if (id === 'user-location') return; // never remove the user location marker
                if (id === 'search-location') return; // never remove the search location marker
                if (!nextIds.has(id)) {
                    marker.setMap(null);
                    markersById.delete(id);

                    const infoWindow = infoWindowsById.get(id);
                    if (infoWindow) {
                        infoWindow.close();
                        infoWindowsById.delete(id);
                    }
                }
            });

            const bounds = new google.maps.LatLngBounds();

            pinList.forEach(pin => {
                const id = String(pin.id);
                if (id === 'user-location') return; // never overwrite the user location marker
                const infoContent = `
                    <div class="info-window">
                        <h3>${pin.name}</h3><br />
                        <p><strong>${pin.city}</strong></p><br />
                        <p class="prices">⛽ Fuel Prices:<br /><table><thead><tr><th>Fuel type</th><th>Price</th></tr></thead><tbody>${pin.prices ? pin.prices.map(p => `<tr><td>${p.fuel_type}</td><td>${p.price}</td></tr>`).join('') : '<tr><td colspan="2">No price data available</td></tr>'}</tbody></table></p><br />
                        <p class="address">📍 Address:<br />${buildAddressLinkHtml(pin)}</p><br />
                        <p class="phone">📞 Telephone:<br />${pin.phone ? `<a href="tel:${pin.phone}">${pin.phone}</a>` : 'No phone available'}</p><br />
                    </div>
                `;

                if (markersById.has(id)) {
                    // Keep existing marker and update mutable fields.
                    const existingMarker = markersById.get(id);
                    existingMarker.setPosition({ lat: pin.lat, lng: pin.lng });
                    existingMarker.setTitle(pin.name || '');

                    const existingInfoWindow = infoWindowsById.get(id);
                    if (existingInfoWindow) {
                        existingInfoWindow.setContent(infoContent);
                    }

                    bounds.extend(existingMarker.getPosition());
                    return;
                }

                const marker = new google.maps.Marker({
                    position: { lat: pin.lat, lng: pin.lng },
                    map: map,
                    title: pin.name,
                    //animation: google.maps.Animation.DROP
                });

                const infoWindow = new google.maps.InfoWindow({
                    content: infoContent
                });

                marker.addListener('click', function() {
                    infoWindowsById.forEach(iw => iw.close());
                    infoWindow.open(map, marker);
                });

                bounds.extend(marker.getPosition());

                markersById.set(id, marker);
                infoWindowsById.set(id, infoWindow);
            });

            syncMarkerCollections();

            // Fit map to show all markers
            //map.fitBounds(bounds);
        }

        // Create a table of station information in the info div on the right side of the screen, based on the latest pins data from the server
        function renderStationInfo(pins) {
            const infoDiv = document.getElementById('location-list');
            const pinList = Array.isArray(pins?.data) ? pins.data : [];

            if (pinList.length === 0) {
                infoDiv.innerHTML = '<p>No stations found in this area.</p>';
                return;
            }

            const stationInfoHtml = pinList.map(pin => `
                <div class="info-window">
                    <h3>${pin.name}</h3>
                    <p class="prices">⛽ Fuel Prices:<br />${pin.prices ? pin.prices.map(p => `${p.fuel_type}: ${p.price}`).join('<br>') : 'No price data available'}</p><br />
                </div>
            `).join('<hr>');

            infoDiv.innerHTML = stationInfoHtml;
        }

        // Helper function to show/hide markers
        function setMarkersVisible(visible) {
            markers.forEach(marker => {
                marker.setVisible(visible);
            });
        }

        // Function to get the user's current location and center the map on it
        function centerMapOnUserLocation() {
            setFollowMeMode();

            if (navigator.geolocation) {
                console.log('Attempting to get user location via Geolocation API...');
                navigator.geolocation.getCurrentPosition((position) => {
                    console.log('User location obtained:', position.coords.latitude, position.coords.longitude);
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    console.log('Centering map on user location...');
                    map.setCenter({ lat, lng: lon });
                    console.log('Setting map zoom level to 14...');
                    map.setZoom(14);

                    // update the location input with the user's current location using reverse geocoding
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: { lat, lng: lon } }, (results, status) => {
                        if (status === 'OK' && results[0]) {
                            document.getElementById('location-input').value = results[0].formatted_address;
                        } else {
                            console.warn('Reverse geocoding failed:', status);
                        }
                    });
                }, (error) => {
                    console.warn(`User denied geolocation or an error occurred (${error.message}), cannot center map on user location`);
                });
            } else {
                console.warn('Geolocation is not supported by this browser, cannot center map on user location');
            }
        }
    </script>

    <!-- Load Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA28JqwGoAkDuCU7UWllZb-aSWQgzLo2LQ&callback=initMap&libraries=places" async defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateFollowMeUI();
        });
    </script>
</body>
</html>
