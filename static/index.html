<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Multiple Points Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .info-window {
            padding: 10px;
            max-width: 200px;
        }

        .info-window h3 {
            margin: 0 0 8px 0;
            color: #1a73e8;
            font-size: 16px;
        }

        .info-window p {
            margin: 4px 0;
            font-size: 14px;
            color: #333;
        }

        .info-window .description {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        let map;
        let markers = [];
        let locations = [];
        let infoWindows = [];

        function initMap() {
            // Create map centered on the world
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 6,
                center: { lat: 54.23782, lng: -4.555111 },
                mapTypeControl: true,
                streetViewControl: false
            });

            // Create bounds to fit all markers
            const bounds = new google.maps.LatLngBounds();

            // Fetch and display markers
            fetchMarkers();
        }

        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
            infoWindows = [];
        }

        function fetchMarkers() {
            let fetchUrl = '/stations';

            // get the current lat lon from the browser's geolocation API, and if the user allows it, use those coordinates to fetch stations data from the server, otherwise fetch stations data without coordinates
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    console.log(`User allowed geolocation, fetching stations data with coordinates: ${lat}, ${lon}`);
                    fetchUrl += `?lat=${lat}&lon=${lon}`;
                }, (error) => {
                    console.warn(`User denied geolocation or an error occurred (${error.message}), fetching stations data without coordinates`);
                });
            } else {
                console.warn('Geolocation is not supported by this browser, fetching stations data without coordinates');
            }

            // Fetch stations data from the server
            fetch(fetchUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data) {
                        locations = data.data.map(station => ({
                            id: station.id,
                            name: station.name,
                            lat: station.lat,
                            lng: station.lng,
                            city: station.city,
                            description: station.description,
                            type: station.type
                        }));
                        // Clear existing markers
                        clearMarkers();

                        // Create bounds to fit all markers
                        const bounds = new google.maps.LatLngBounds();

                        let locationCount = locations.length;
                        console.log(`Fetched ${locationCount} stations from the server`);

                        // Add markers for each location
                        locations.forEach((location) => {
                            addMarker(location, bounds);
                        });

                        // Fit map to show all markers
                        //map.fitBounds(bounds);
                    } else {
                        console.error('Failed to load stations data:', data.message);
                    }
                })
                .catch(error => {
                    console.error('Error fetching stations data:', error);
                });
        }

        function addMarker(location, bounds) {
            // Create marker
            const marker = new google.maps.Marker({
                position: { lat: location.lat, lng: location.lng },
                map: map,
                title: location.name,
                animation: google.maps.Animation.DROP
            });

            // Create info window content
            const infoContent = `
                <div class="info-window">
                    <h3>${location.name}</h3>
                    <p><strong>${location.city}</strong></p>
                    <p class="description">${location.description}</p>
                </div>
            `;

            // Create info window
            const infoWindow = new google.maps.InfoWindow({
                content: infoContent
            });

            // Add click listener to marker
            marker.addListener('click', function() {
                // Close all other info windows
                infoWindows.forEach(iw => iw.close());
                
                // Open this info window
                infoWindow.open(map, marker);
            });

            // Extend bounds to include this marker
            bounds.extend(marker.getPosition());

            // Store references
            markers.push(marker);
            infoWindows.push(infoWindow);
        }

        // Helper function to add a new location dynamically
        function addNewLocation(locationData) {
            const bounds = new google.maps.LatLngBounds();
            
            // Extend bounds with existing markers
            markers.forEach(marker => {
                bounds.extend(marker.getPosition());
            });

            // Add new marker
            addMarker(locationData, bounds);

            // Fit map to show all markers
            map.fitBounds(bounds);
        }

        // Helper function to clear all markers
        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
            infoWindows = [];
        }

        // Helper function to show/hide markers
        function setMarkersVisible(visible) {
            markers.forEach(marker => {
                marker.setVisible(visible);
            });
        }
    </script>

    <!-- Load Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA28JqwGoAkDuCU7UWllZb-aSWQgzLo2LQ&callback=initMap" async defer></script>
</body>
</html>
