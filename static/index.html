<body>

                <g>
                    <path d="M446.004,94.564c-33.248-33.249-75.207-55.202-121.336-63.486c-45.041-8.089-90.929-2.688-132.696,15.613l22.446,51.225c65.826-28.843,141.209-14.639,192.039,36.194c67.525,67.525,67.525,177.397,0,244.922c-67.525,67.526-177.399,67.526-244.925,0c-34.179-34.18-51.897-79.672-50.794-126.175l67.115,18.972l-22.693-89.581l-22.694-89.583l-66.232,64.446L0,221.555l55.681,15.739c-1.95,23.192-0.377,46.666,4.771,69.614c9.485,42.284,30.763,80.898,61.535,111.671c43.274,43.273,100.81,67.105,162.007,67.105c0.004,0-0.002,0,0.002,0c61.193,0,118.736-23.835,162.01-67.105c43.273-43.274,67.104-100.811,67.104-162.01C513.109,195.374,489.277,137.837,446.004,94.564z" fill="#111"/>
                </g>
            </svg>
        </button>
        <button id="search-mode-toggle" title="Click to enable manual location search" onclick="toggleSearchMode()">✏️</button>
        <input id="location-input" title="Enter a location" type="text" placeholder="Enter a location">
        <button id="menu-toggle" title="Toggle menu">

    </div>

    <div id="info">
        <div id="location-sorter">
            <select id="sort-options">
                <option value="distance">Distance (order by)</option>
            </select>
        </div>
        <div id="location-list">
            <div class="location-list-placeholder">
                <p>Loading stations...</p>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="main.js"></script>

    <script>
        const defaultMapsApiKey = 'AIzaSyBZBhqOIrxogvyAYko5uFbl7kH9nR28HS0'; // limited to server ip address
        const localMapsApiKey = 'AIzaSyA28JqwGoAkDuCU7UWllZb-aSWQgzLo2LQ'; // limited to wan ip address
        const isLocal127 = window.location.protocol === 'http:' &&
            window.location.hostname === '127.0.0.1' &&
            window.location.port === '8080';

        const mapsApiKey = isLocal127 ? localMapsApiKey : defaultMapsApiKey;
        const mapsScript = document.createElement('script');
        mapsScript.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(mapsApiKey)}&callback=initMap&libraries=places,marker,routes&loading=async`;
        mapsScript.async = true;
        mapsScript.defer = true;
        document.body.appendChild(mapsScript);
    </script>
